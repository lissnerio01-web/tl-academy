<!DOCTYPE html><html><head><meta charset='utf-8'><title>Quiz Operaciones Keila</title>
<style>body{font-family:Arial;max-width:900px;margin:auto;padding:20px}button{margin:5px;padding:10px}.card{border:1px solid #ddd;padding:20px;border-radius:10px}</style>
</head><body><h1>Quiz Operaciones y Personal - Modo Estudio</h1><div id='app' class='card'></div>
<script>
const q=[("¿Qué significa SL?", ["Service Level", "Service Load", "Support Line", "Standard Level"], 0, "Nivel de Servicio."), ("¿Qué significa AHT?", ["Average Handle Time", "Agent Help Tool", "Average Hold Transfer", "Action Handling Time"], 0, "Tiempo Promedio de Manejo."), ("¿Qué representa FTE?", ["Horas extra", "Equivalente a Tiempo Completo", "Forecast Team Efficiency", "Final Team Evaluation"], 1, "Carga de trabajo de un empleado a jornada completa."), ("¿Qué significa OTF?", ["Offer to Forecast", "Over Time Forecast", "Outbound Transfer Flow", "Operational Task Flow"], 0, "Comparación entre volumen real y proyectado."), ("¿Qué métrica mide tiempo activo del agente?", ["SNPS", "AP/APIN", "SL", "LOB"], 1, "Productividad del Agente."), ("¿Qué mide OCC?", ["Calidad", "Ocupación", "Ausentismo", "Rotación"], 1, "Tiempo en atención activa o ACW."), ("¿Qué significa SNPS?", ["Service NPS", "Transactional Net Promoter Score", "Supervisor NPS", "Standard NPS"], 1, "Mide satisfacción y lealtad."), ("¿Qué significa OM?", ["Operations Manager", "Office Manager", "Operations Metric", "Official Monitor"], 0, "Gerente de Operaciones."), ("¿Qué significa PS?", ["People Solutions", "Performance System", "Process Support", "Productivity Score"], 0, "Recursos Humanos."), ("¿Qué significa TL?", ["Team Leader", "Training Lead", "Top Leader", "Team Liaison"], 0, "Supervisor directo."), ("¿Qué plataforma se usa para RRHH?", ["Pulse", "eStart", "Workday", "Core"], 2, "Workday."), ("¿Qué son VGH/VTO?", ["Capacitación", "Estrategias de reducción de costos", "Auditorías", "Bonos"], 1, "Horas libres voluntarias."), ("¿Cuál es una ausencia justificada?", ["Llegar tarde", "Licencia médica", "Olvido", "Cambio de turno"], 1, "Medical Leave."), ("¿Cuál es el primer paso disciplinario?", ["Written Warning", "Coaching/Carta compromiso", "Final Warning", "Terminación"], 1, "Inicio formal."), ("¿Qué ocurrió con las suspensiones temporales?", ["Se ampliaron", "Se eliminaron", "Son obligatorias", "No existen reglas"], 1, "Fueron eliminadas."), ("¿Qué debe hacerse con las amonestaciones?", ["Imprimirlas", "Archivarlas físicas", "Documentarlas digitalmente", "Ignorarlas"], 2, "Proceso digital."), ("Ante Job Abandonment, ¿qué sigue tras llamar al agente?", ["Workday", "PS", "OM", "QA"], 2, "Informar al OM."), ("¿Qué debe validar un supervisor para vacaciones?", ["AHT", "Vacation Accruals", "SNPS", "OTF"], 1, "Saldos acumulados."), ("¿Qué representa SL?", ["Llamadas dentro del umbral", "Ausencias", "Capacidad", "Rotación"], 0, "Nivel de Servicio."), ("¿Qué significa GROW?", ["Goal Reality Options Will", "Go Run Organize Win", "Growth Rate Output Work", "Ninguna"], 0, "Metodología de coaching."), ("¿Cuánto dura un Glide Path?", ["1 semana", "2 semanas", "4 semanas", "6 semanas"], 2, "Plan de mejora de 4 semanas."), ("¿Qué impacta negativamente APIN?", ["Breaks", "Training", "Coaching", "Todas las anteriores"], 3, "Todas restan tiempo productivo."), ("¿Cuál NO es una herramienta diaria del TL?", ["Workday", "Pulse", "Netflix", "eStart"], 2, "Netflix no aparece."), ("En el caso de asistencia, ¿resultado final?", ["78.03%", "85%", "90%", "70%"], 0, "44h menos ausencias."), ("Con SL 50% y staffing favorable, la causa raíz fue:", ["OTF elevado", "Vacaciones", "SNPS", "QA"], 0, "Volumen superior al forecast."), ("Si el CAP llegará al 107%, ¿qué acción tomar?", ["Contratar más", "VGH/VTO", "Más breaks", "Más training"], 1, "Reducir horas estratégicamente."), ("Con OCC 45% y OTF 75%, ¿qué hacer?", ["Más personal", "VGH", "Más overtime", "Nada"], 1, "Reducir personal inactivo."), ("¿Cuántas llamadas de capacidad total produce el caso 5?", ["2611", "1800", "3000", "1500"], 0, "Resultado del cálculo."), ("En SMARTER, Skill issue significa:", ["Falta de conocimiento", "Falta de motivación", "Ausentismo", "Rotación"], 0, "Brecha de conocimiento."), ("¿Cómo impacta el attrition al GP?", ["Lo mejora", "Reduce margen y desarrollo", "No afecta", "Aumenta bonos"], 1, "Impacto financiero y desarrollo.")];
let i=0,s=0;
function render(){
if(i>=q.length){document.getElementById('app').innerHTML=`<h2>Resultado: ${s}/${q.length}</h2><h3>${Math.round(s/q.length*100)}%</h3><button onclick='location.reload()'>Reiniciar</button>`;return;}
let x=q[i];
let h=`<h3>Pregunta ${i+1} de ${q.length}</h3><p><b>${x[0]}</b></p>`;
x[1].forEach((a,n)=>h+=`<button onclick='ans(${n})'>${a}</button><br>`);
h+=`<div id='fb'></div>`;
document.getElementById('app').innerHTML=h;
}
function ans(n){
let x=q[i]; let ok=n===x[2]; if(ok)s++;
document.getElementById('fb').innerHTML=`<hr>${ok?'✅ Correcto':'❌ Incorrecto'}<br><b>Explicación:</b> ${x[3]}<br><button onclick='next()'>Siguiente</button>`;
}
function next(){i++;render();}
render();
</script></body></html>
