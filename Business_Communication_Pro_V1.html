<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Business Communication Pro</title>

</head><body><div class='box'><div id='app' class='card'></div></div>
<script>
const q=[{"cat": "Emails", "q": "Al redactar un texto profesional deben primar las frases:", "a": ["Largas", "Cortas", "Subordinadas", "Complejas"], "c": 1, "e": "Las frases cortas facilitan la comprensión."}, {"cat": "Emails", "q": "¿Qué debe evitarse en correos profesionales?", "a": ["Humor o ironía", "Saludos", "Firma", "Asunto"], "c": 0, "e": "El humor puede causar malentendidos."}, {"cat": "Emails", "q": "La despedida del email debe ir acorde con el saludo.", "a": ["Verdadero", "Falso"], "c": 0, "e": "Mantiene coherencia y profesionalismo."}, {"cat": "Emails", "q": "¿Cuál suele estar estandarizada en una empresa?", "a": ["Firma corporativa", "Saludo", "Asunto", "Despedida"], "c": 0, "e": "La firma corporativa suele ser uniforme."}, {"cat": "Emails", "q": "Una buena forma de organizar ideas es:", "a": ["Mayúsculas", "Numerarlas o separarlas", "Colores", "Un párrafo largo"], "c": 1, "e": "Mejora la claridad."}, {"cat": "BCC", "q": "¿Cuándo usar copia oculta?", "a": ["Correos masivos", "Siempre", "Nunca", "Solo clientes"], "c": 0, "e": "Protege la privacidad de los destinatarios."}, {"cat": "BCC", "q": "Si alguien responde desde copia oculta, ¿a quién llega?", "a": ["A todos", "A nadie", "A quien escribió", "Solo a BCC"], "c": 2, "e": "La respuesta llega al remitente."}, {"cat": "Emails", "q": "La confirmación de entrega indica que:", "a": ["Fue leído", "Llegó al buzón", "Fue respondido", "Se imprimió"], "c": 1, "e": "Confirma entrega, no lectura."}, {"cat": "Emails", "q": "¿Cuándo responder un correo recibido fuera de horario?", "a": ["Inmediatamente", "El siguiente día laboral", "Fin de semana", "Madrugada"], "c": 1, "e": "Se recomienda responder en horario laboral."}, {"cat": "Emails", "q": "Para gestionar correo eficientemente es mejor:", "a": ["Revisarlo cada minuto", "Fijar horas concretas", "Solo fines de semana", "Nunca"], "c": 1, "e": "Reduce interrupciones."}, {"cat": "Informes", "q": "Los informes suelen contener:", "a": ["Rumores", "Información confidencial", "Solo opiniones", "Publicidad"], "c": 1, "e": "Pueden incluir información sensible."}, {"cat": "Informes", "q": "Los informes habituales son informativos y:", "a": ["Analíticos", "Subjetivos", "Referenciales", "Creativos"], "c": 0, "e": "Los analíticos ayudan a interpretar datos."}, {"cat": "Mensajería", "q": "La mensajería instantánea profesional se usa para:", "a": ["Respuestas rápidas", "Temas personales", "Auditorías", "Contratos"], "c": 0, "e": "Es ideal para comunicación breve."}, {"cat": "Mensajería", "q": "Las abreviaturas deben evitarse:", "a": ["Siempre", "Nunca", "Excepto las universales", "Solo en inglés"], "c": 2, "e": "Algunas abreviaturas son universalmente entendidas."}, {"cat": "Mensajería", "q": "Lo más importante al escribir mensajes es:", "a": ["Responder rápido", "Elegir bien las palabras", "Usar emojis", "Escribir mucho"], "c": 1, "e": "Evita malentendidos."}, {"cat": "Videoconferencia", "q": "Una ventaja de videoconferencias es:", "a": ["Compartir pantalla", "Eliminar reuniones", "Reducir salarios", "Más pausas"], "c": 0, "e": "Permite colaboración visual."}, {"cat": "Videoconferencia", "q": "Si hay participantes no nativos se recomienda:", "a": ["Hablar rápido", "Hablar despacio", "No hablar", "Escribir todo"], "c": 1, "e": "Facilita la comprensión."}, {"cat": "Videoconferencia", "q": "Una norma básica es:", "a": ["Interrumpir", "No interrumpir", "Hablar encima", "Multitarea"], "c": 1, "e": "Mejora la comunicación."}, {"cat": "Teléfono", "q": "Si alguien llama y la persona no está, debes anotar:", "a": ["Número de teléfono", "Color favorito", "Salario", "Edad"], "c": 0, "e": "Facilita devolver la llamada."}, {"cat": "Teléfono", "q": "La estructura correcta de un buzón de voz es:", "a": ["Saludo, identificación, tema, contacto y despedida", "Tema y despedida", "Solo contacto", "Solo saludo"], "c": 0, "e": "Incluye toda la información necesaria."}, {"cat": "Digital", "q": "Primer paso en transformación digital:", "a": ["Comprar tecnología", "Definir visión digital", "Despedir personal", "Crear app"], "c": 1, "e": "La visión guía la transformación."}, {"cat": "Digital", "q": "Un líder digital debe:", "a": ["Evitar innovación", "Promover experimentación", "Reducir tecnología", "Ignorar datos"], "c": 1, "e": "La cultura de experimentación es clave."}, {"cat": "Digital", "q": "Para una buena experiencia de usuario debes:", "a": ["Entender necesidades del cliente", "Usar la última tecnología", "Reducir opciones", "Automatizar todo"], "c": 0, "e": "Las necesidades del cliente son la base."}, {"cat": "Digital", "q": "¿Qué caracteriza a Uber y Airbnb?", "a": ["No poseen activos tradicionales", "Fabrican productos", "Solo publicidad", "Solo logística"], "c": 0, "e": "Operan plataformas sin poseer los activos principales."}, {"cat": "Digital", "q": "La economía digital es:", "a": ["Actividad comercial impulsada por Internet y tecnología", "Criptomonedas", "Solo e-commerce", "Redes sociales"], "c": 0, "e": "Abarca la actividad económica digital."}, {"cat": "Digital", "q": "¿Cuándo usar redes sociales para escuchar estratégicamente?", "a": ["Desde el inicio", "Cuando tengas muchos seguidores", "Al final", "Nunca"], "c": 0, "e": "La escucha debe comenzar temprano."}, {"cat": "Digital", "q": "¿Cómo preparar colegas para la transformación digital?", "a": ["Coaching", "Ignorarlos", "Solo tecnología", "Sin formación"], "c": 0, "e": "El coaching ayuda a superar barreras."}, {"cat": "Caso", "q": "Debes enviar un correo a 100 personas. ¿Qué usas?", "a": ["BCC", "Responder a todos", "CC visible", "Chat"], "c": 0, "e": "Protege datos personales."}, {"cat": "Caso", "q": "En videoconferencia alguien interrumpe constantemente. ¿Qué principio aplicar?", "a": ["No interrumpir", "Hablar más fuerte", "Ignorarlo", "Finalizar reunión"], "c": 0, "e": "Es una norma básica de etiqueta."}, {"cat": "Caso", "q": "Recibes un correo complejo. ¿Qué mejora su lectura?", "a": ["Listas y numeración", "Mayúsculas", "Colores", "Texto continuo"], "c": 0, "e": "Organizar ideas mejora la comprensión."}];let i=0,s=0;
function draw(){if(i>=q.length){app.innerHTML='<h1>💼 Business Communication Pro</h1><h2>'+s+'/'+q.length+'</h2><h3>'+Math.round(s/q.length*100)+'%</h3><button onclick="location.reload()">Reiniciar</button>';return;}
let x=q[i],h='<h2>💼 Business Communication Pro</h2><p><b>'+x.cat+'</b> | '+(i+1)+'/'+q.length+'</p><h3>'+x.q+'</h3>';
x.a.forEach((v,n)=>h+='<button onclick="ans('+n+')">'+v+'</button>');app.innerHTML=h;}
function ans(n){let x=q[i],ok=n===x.c;if(ok)s++;app.innerHTML+='<hr><h3>'+(ok?'✅ Correcto':'❌ Incorrecto')+'</h3><p>'+x.e+'</p><button onclick="i++;draw()">Siguiente</button>';}
draw();
</script></body></html>
