
<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Leadership Academy V1</title>
<style>
body{font-family:Arial;background:#111;color:#fff;margin:0}
.box{max-width:700px;margin:auto;padding:15px}
.card{background:#222;padding:15px;border-radius:12px}
button{width:100%;padding:12px;margin:6px 0;border:none;border-radius:10px}
</style></head><body><div class='box'><div id='app' class='card'></div></div>
<script>
const q=[{"cat": "Retención", "q": "¿Qué porcentaje de las razones por las que los empleados se van son evitables?", "a": ["25%", "50%", "77%", "90%"], "c": 2, "e": "El curso indica que 77% de las razones son evitables."}, {"cat": "Retención", "q": "Reemplazar a un empleado puede costar:", "a": ["10%-20%", "20%-40%", "50%-200%", "500%"], "c": 2, "e": "La rotación tiene un costo elevado para la organización."}, {"cat": "Retención", "q": "Retener talento significa:", "a": ["Evitar renuncias", "Construir lazos y motivación", "Pagar más", "Dar vacaciones"], "c": 1, "e": "La retención se basa en que las personas se sientan valoradas."}, {"cat": "Retención", "q": "¿Qué NO ayuda a retener talento?", "a": ["Reconocimiento", "Desarrollo", "Micromanagement", "Comunicación"], "c": 2, "e": "El micromanagement suele disminuir el compromiso."}, {"cat": "Retención", "q": "Perder una persona clave puede afectar:", "a": ["Moral del equipo", "Clientes", "Proyectos", "Todas"], "c": 3, "e": "La salida de talento impacta múltiples áreas."}, {"cat": "Radical Candor", "q": "¿Qué libro se menciona como referencia principal?", "a": ["Drive", "Radical Candor", "The Coaching Habit", "Leaders Eat Last"], "c": 1, "e": "Kim Scott es la autora de Radical Candor."}, {"cat": "Radical Candor", "q": "Radical Candor combina:", "a": ["Control y métricas", "Empatía y silencio", "Cuidado personal y feedback directo", "Premios y castigos"], "c": 2, "e": "Se preocupa por la persona y desafía directamente."}, {"cat": "Radical Candor", "q": "Un líder efectivo debe:", "a": ["Evitar conversaciones difíciles", "Reconocer y desafiar", "Solo reconocer", "Solo corregir"], "c": 1, "e": "El crecimiento requiere reconocimiento y desafío."}, {"cat": "Radical Candor", "q": "El feedback debe ser:", "a": ["Claro y honesto", "Indirecto", "Confuso", "Ocasional"], "c": 0, "e": "La claridad mejora el desarrollo."}, {"cat": "Radical Candor", "q": "¿Cuál es un ejemplo de cuidado personal?", "a": ["Ignorar problemas", "Preguntar cómo está alguien", "Evitar feedback", "Controlar todo"], "c": 1, "e": "Interesarse genuinamente por las personas."}, {"cat": "Empatía", "q": "La empatía significa:", "a": ["Estar siempre de acuerdo", "Comprender emociones", "Evitar conflictos", "Ser permisivo"], "c": 1, "e": "Comprender no significa evitar decisiones difíciles."}, {"cat": "Empatía", "q": "La autenticidad en el liderazgo ayuda a:", "a": ["Generar confianza", "Ocultar errores", "Evitar cambios", "Reducir comunicación"], "c": 0, "e": "Las personas confían más en líderes auténticos."}, {"cat": "Empatía", "q": "¿Qué fortalece la conexión con el equipo?", "a": ["Escucha activa", "Más reportes", "Más controles", "Menos reuniones"], "c": 0, "e": "Escuchar es clave para comprender necesidades."}, {"cat": "Empatía", "q": "Un líder humano se caracteriza por:", "a": ["Empatía", "Indiferencia", "Distancia", "Rigidez"], "c": 0, "e": "La empatía es una competencia central."}, {"cat": "Empatía", "q": "La confianza se construye mediante:", "a": ["Interés genuino", "Solo resultados", "Correcciones", "Auditorías"], "c": 0, "e": "La relación humana fortalece la confianza."}, {"cat": "Desarrollo", "q": "Un líder debe impulsar:", "a": ["Crecimiento profesional", "Dependencia", "Competencia tóxica", "Estancamiento"], "c": 0, "e": "El desarrollo es parte de liderar."}, {"cat": "Desarrollo", "q": "El reconocimiento efectivo debe ser:", "a": ["Específico", "Genérico", "Inexistente", "Automático"], "c": 0, "e": "Reconocer conductas concretas tiene más impacto."}, {"cat": "Desarrollo", "q": "¿Qué motiva más a largo plazo?", "a": ["Desarrollo", "Miedo", "Control", "Castigo"], "c": 0, "e": "Las oportunidades de crecimiento son un gran motivador."}, {"cat": "Desarrollo", "q": "Un buen líder ayuda a crecer:", "a": ["Solo dentro de la empresa", "Incluso si luego se va", "Nunca", "Solo a top performers"], "c": 1, "e": "El desarrollo genuino busca el beneficio de la persona."}, {"cat": "Desarrollo", "q": "El coaching busca:", "a": ["Desarrollar habilidades", "Castigar", "Auditar", "Controlar"], "c": 0, "e": "El coaching se centra en el crecimiento."}, {"cat": "Casos", "q": "Un agente está desmotivado. ¿Qué haces primero?", "a": ["Corrective Action", "Hablar con él", "Ignorarlo", "Escalarlo"], "c": 1, "e": "Primero comprende la situación."}, {"cat": "Casos", "q": "Un colaborador cometió un error. ¿Qué haces?", "a": ["Humillarlo", "Feedback claro", "Ignorarlo", "Documentarlo sin hablar"], "c": 1, "e": "El feedback oportuno ayuda a mejorar."}, {"cat": "Casos", "q": "Dos agentes tienen un conflicto. ¿Primer paso?", "a": ["Escuchar a ambos", "Sancionar", "Ignorarlo", "Mover horarios"], "c": 0, "e": "Comprender ambas perspectivas."}, {"cat": "Casos", "q": "Un top performer quiere crecer. ¿Qué haces?", "a": ["Retenerlo sin cambios", "Crear plan de desarrollo", "Ignorarlo", "Dar más trabajo"], "c": 1, "e": "El desarrollo ayuda a retener talento."}, {"cat": "Casos", "q": "Un agente recibe feedback difícil. ¿Cómo darlo?", "a": ["Directo y respetuoso", "Por chat sin contexto", "Frente a todos", "Solo por correo"], "c": 0, "e": "Feedback claro y humano."}, {"cat": "Casos", "q": "¿Qué haría un líder que nadie quiere dejar?", "a": ["Controlar todo", "Reconocer y desarrollar", "Evitar conversaciones", "Solo medir KPIs"], "c": 1, "e": "Invierte en las personas."}, {"cat": "Casos", "q": "¿Qué debe priorizar un líder?", "a": ["Personas y resultados", "Solo resultados", "Solo procesos", "Solo reportes"], "c": 0, "e": "El equilibrio es clave."}, {"cat": "Casos", "q": "Una persona piensa renunciar. ¿Qué hacer?", "a": ["Escuchar razones", "Aceptar sin hablar", "Ignorar señales", "Esperar"], "c": 0, "e": "Comprender causas puede ayudar a retener."}, {"cat": "Casos", "q": "La comunicación efectiva debe ser:", "a": ["Clara y honesta", "Compleja", "Ambigua", "Escasa"], "c": 0, "e": "La claridad evita malentendidos."}, {"cat": "Casos", "q": "¿Qué palabra puede marcar la diferencia en liderazgo?", "a": ["Gracias", "Nada", "Reporte", "Métrica"], "c": 0, "e": "El reconocimiento sincero importa."}];
let i=0,s=0;
function draw(){
 if(i>=q.length){app.innerHTML=`<h1>🏆 Leadership Academy</h1><h2>${s}/${q.length}</h2><h3>${Math.round(s/q.length*100)}%</h3><button onclick="location.reload()">Reiniciar</button>`;return;}
 let x=q[i],h=`<h2>👥 Leadership Academy V1</h2><p><b>${x.cat}</b> | Pregunta ${i+1}/${q.length}</p><h3>${x.q}</h3>`;
 x.a.forEach((v,n)=>h+=`<button onclick="ans(${n})">${v}</button>`);
 app.innerHTML=h;
}
function ans(n){
 let x=q[i],ok=n===x.c;if(ok)s++;
 app.innerHTML+=`<hr><h3>${ok?'✅ Correcto':'❌ Incorrecto'}</h3><p>${x.e}</p><button onclick="i++;draw()">Siguiente</button>`;
}
draw();
</script></body></html>
