
<!DOCTYPE html><html><head><meta charset='utf-8'><title>Quiz Manager</title>
<style>body{font-family:Arial;max-width:900px;margin:auto;padding:20px}button{margin:6px;padding:10px}.c{border:1px solid #ccc;padding:20px;border-radius:12px}</style>
</head><body><h1>Quiz: Sé el Manager que Nadie Quiere Dejar</h1><div id='app' class='c'></div>
<script>
const q=[('¿Qué porcentaje de las razones por las que los empleados se van son evitables?', ['25%', '50%', '77%', '90%'], 2), ('Retener talento significa:', ['Solo permanecer en la empresa', 'Construir lazos y motivación', 'Aumentar salarios', 'Evitar despidos'], 1), ('Reemplazar a un empleado puede costar:', ['10%-20% del salario', '25%-50%', '50%-200%', '300%-400%'], 2), ('¿Cuál NO es un ingrediente clave para retener talento?', ['Comunicación', 'Aprecio', 'Desafíos', 'Micromanagement'], 3), ('Un líder que nadie quiere dejar se caracteriza por:', ['Reconocer y desafiar', 'Ignorar errores', 'Controlar todo', 'Evitar feedback'], 0), ('¿Qué libro se menciona como referencia clave?', ['Drive', 'The Miracle Morning', 'Radical Candor', 'Lean Startup'], 2), ('La satisfacción del equipo aumenta cuando las personas se sienten:', ['Vigiladas', 'Reconocidas y escuchadas', 'Evaluadas', 'Competidas'], 1), ('La comunicación efectiva debe ser:', ['Compleja', 'Indirecta', 'Clara y honesta', 'Formal únicamente'], 2), ('La empatía en liderazgo implica:', ['Ser blando', 'Comprender emociones sin evitar conversaciones difíciles', 'Evitar conflictos', 'Dar siempre la razón'], 1), ('Indra Nooyi destacó por:', ['Ser estricta', 'Promover vulnerabilidad y autenticidad', 'Crear Radical Candor', 'Fundar Pepsi'], 1), ('¿Qué construye confianza con el equipo?', ['Mostrar interés genuino', 'Más reportes', 'Más reuniones', 'Más controles'], 0), ('Radical Candor combina:', ['Dureza sin humanidad', 'Cuidado personal y feedback directo', 'Solo elogios', 'Solo críticas'], 1), ('¿Cuál es una zona negativa del feedback?', ['Radical Candor', 'Escucha activa', 'Agresión odiosa', 'Empatía auténtica'], 2), ('En Radical Candor, al recibir feedback debes:', ['Defenderte', 'Escuchar para aprender', 'Ignorarlo', 'Responder de inmediato'], 1), ('Una cultura de comunicación abierta requiere:', ['Relaciones de confianza', 'Más jerarquías', 'Menos reuniones', 'Más controles'], 0), ('Para fomentar apertura el líder debe:', ['Ser vulnerable', 'Guardar distancia', 'Evitar preguntas', 'No compartir dudas'], 0), ('La escucha activa ayuda a:', ['Detectar problemas antes de crisis', 'Reducir creatividad', 'Evitar colaboración', 'Limitar opiniones'], 0), ('¿Qué es la escucha silenciosa?', ['Escuchar sin opinar', 'No escuchar', 'Dar consejos constantes', 'Tomar notas'], 0), ('¿Qué es la escucha ruidosa?', ['Interrumpir', 'Preguntar y reaccionar', 'Hablar más que el otro', 'Dar órdenes'], 1), ('El feedback debe dirigirse a:', ['La personalidad', 'El carácter', 'Las acciones y conductas', 'La vida personal'], 2), ('El growth mindset promueve:', ['Estancamiento', 'Mejora continua', 'Competencia negativa', 'Control'], 1), ('Celebrar logros es:', ['Una pérdida de tiempo', 'Solo una fiesta', 'Una estrategia de liderazgo', 'Un gasto'], 2), ('Según el material, el reconocimiento puede aumentar la retención en más de:', ['10%', '20%', '30%', '50%'], 2), ('La diversidad e inclusión generan:', ['Menos creatividad', 'Mejores decisiones', 'Más problemas', 'Menos rendimiento'], 1), ('Los equipos diversos suelen:', ['Usar menos datos', 'Reexaminar hipótesis', 'Pensar igual', 'Evitar conflictos'], 1), ('El balance vida-trabajo beneficia a:', ['Solo empleados', 'Solo líderes', 'Empresa y empleados', 'Nadie'], 2), ('Según el material, organizaciones con mejor equilibrio pueden aumentar productividad en:', ['5%', '10%', '21%', '40%'], 2), ('Según Daniel Pink, la motivación intrínseca surge de:', ['Control y salario', 'Autonomía y mejora', 'Disciplina y castigo', 'Tiempo libre'], 1), ("Las personas 'superstars' buscan:", ['Estabilidad', 'Desafíos y crecimiento rápido', 'Menos responsabilidades', 'Rutina'], 1), ('Para apoyar el crecimiento del equipo, lo primero es:', ['Preguntar qué les motiva', 'Dar incentivos económicos', 'Asignar más trabajo', 'Evaluar resultados'], 0)]; let i=0,s=0;
function r(){
 if(i>=q.length){app.innerHTML=`<h2>Puntaje ${s}/${q.length}</h2><h3>${Math.round(s/q.length*100)}%</h3><button onclick='location.reload()'>Reiniciar</button>`;return;}
 let x=q[i],h=`<h3>${i+1}/${q.length}</h3><p><b>${x[0]}</b></p>`;
 x[1].forEach((a,n)=>h+=`<button onclick='a1(${n})'>${a}</button><br>`);
 app.innerHTML=h;
}
function a1(n){let ok=n===q[i][2]; if(ok)s++; app.innerHTML+=`<hr>${ok?'✅ Correcto':'❌ Incorrecto'}<br><button onclick='i++;r()'>Siguiente</button>`;}
r();
</script></body></html>
